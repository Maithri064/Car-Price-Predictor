<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Car Price Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .main-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .card-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0;
        }
        .form-group label {
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        .form-control {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #ffffff;
            border-radius: 8px;
            height: 45px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background-color: #0f172a;
            border-color: #6366f1;
            color: #ffffff;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .btn-predict {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            border: none;
            color: white;
            font-weight: 600;
            height: 48px;
            border-radius: 8px;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-predict:hover {
            background: linear-gradient(135deg, #4338ca 0%, #2e267d 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transform: translateY(-1px);
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #0f172a;
            border-radius: 10px;
            border-left: 4px solid #38bdf8;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-sm-10">
            <div class="card main-card p-4">

                <div class="card-header text-center bg-transparent border-0 pb-3">
                    <h1>Car Price Predictor</h1>
                </div>

                <div class="card-body p-2">
                    <form method="post" accept-charset="utf-8" name="ModelForm">

                        <div class="form-group mb-4">
                            <label for="company">Select Company</label>
                            <select class="form-control" id="company" name="company" required="1" onchange="load_car_models(this.id, 'car_models')">
                                <option value="" disabled selected>Choose a manufacturer...</option>
                                {% for company in companies %}
                                <option value="{{ company }}">{{ company }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group mb-4">
                            <label for="car_models">Select Model</label>
                            <select class="form-control" id="car_models" name="car_models" required="1">
                                <option value="" disabled selected>Choose a model...</option>
                                {% for model in car_models %}
                                <option value="{{ model }}">{{ model }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group mb-4">
                            <label for="year">Select Year of Purchase</label>
                            <select class="form-control" id="year" name="year" required="1">
                                <option value="" disabled selected>Choose registration year...</option>
                                {% for year in years %}
                                <option value="{{ year }}">{{ year }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group mb-4">
                            <label for="fuel_type">Select Fuel Type</label>
                            <select class="form-control" id="fuel_type" name="fuel_type" required="1">
                                <option value="" disabled selected>Choose fuel variant...</option>
                                {% for fuel in fuel_types %}
                                <option value="{{ fuel }}">{{ fuel }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group mb-4">
                            <label for="kilo_driven">Enter Kilometers Driven</label>
                            <input type="number" class="form-control" id="kilo_driven" name="kilo_driven" placeholder="e.g. 45000" required="1">
                        </div>

                        <div class="form-group pt-2">
                            <button class="btn btn-predict btn-block" onclick="send_data()">Predict Price</button>
                        </div>

                    </form>

                    <div class="result-box text-center">
                        <p class="result-text" id="prediction">Fill out the details above to estimate value.</p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function load_car_models(company_id, car_model_id) {
        var company = document.getElementById(company_id);
        var car_model = document.getElementById(car_model_id);
        car_model.value = "";
        car_model.innerHTML = "<option value='' disabled selected>Choose a model...</option>";

        {% for company in companies %}
            if (company.value == "{{ company }}") {
                {% for model in car_models %}
                    {% if company in model %}
                        var newOption = document.createElement("option");
                        newOption.value = "{{ model }}";
                        newOption.innerHTML = "{{ model }}";
                        car_model.options.add(newOption);
                    {% endif %}
                {% endfor %}
            }
        {% endfor %}
    }

    function form_handler(event) {
        event.preventDefault();
    }

    function send_data() {
        document.querySelector('form').addEventListener("submit", form_handler);

        var fd = new FormData(document.querySelector('form'));
        var xhr = new XMLHttpRequest();

        xhr.open('POST', '/predict', true);
        document.getElementById('prediction').innerHTML = "🧠 Machine learning model running prediction...";

        xhr.onreadystatechange = function() {
            if (xhr.readyState == XMLHttpRequest.DONE) {
                if (xhr.status == 200) {
                    document.getElementById('prediction').innerHTML = "Estimated Valuation: <span class='text-warning'>₹ " + xhr.responseText + "</span>";
                } else {
                    document.getElementById('prediction').innerHTML = "<span class='text-danger'>Error calculating value on server backend.</span>";
                }
            }
        };

        xhr.send(fd);
    }
</script>

</body>
</html>
